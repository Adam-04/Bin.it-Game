spring.application.name=Bin-It
# Neon PostgreSQL connection (loaded from .env / environment variable)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# minimum idle connections - don't keep unnecessary connections open
spring.datasource.hikari.minimum-idle=1

# maximum pool size - limit concurrent connections
spring.datasource.hikari.maximum-pool-size=3

# release idle connections after 30 seconds
spring.datasource.hikari.idle-timeout=30000

# connection lifetime of 1 minute
spring.datasource.hikari.max-lifetime=60000

# how long to wait for a connection before throwing an error
spring.datasource.hikari.connection-timeout=30000

# keep alive to prevent Neon from dropping idle connections
spring.datasource.hikari.keepalive-time=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Prevent Hibernate from holding open-in-view connections unnecessarily
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# CORS - Allow requests from the frontend URL
app.frontend-url=${FRONTEND_URL}

# Deployment config
server.port=443
spring.ssl.bundle.pem.binit.keystore.certificate=file:/etc/letsencrypt/certs/fullchain.pem
spring.ssl.bundle.pem.binit.keystore.private-key=file:/etc/letsencrypt/certs/privkey.pem
server.ssl.bundle=binit
