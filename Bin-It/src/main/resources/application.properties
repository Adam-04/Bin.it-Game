spring.application.name=Bin-It
# Neon PostgreSQL connection (loaded from .env / environment variable)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# CORS - Allow requests from the frontend URL
app.frontend-url=${FRONTEND_URL}

# Deployment config
server.port=443
spring.ssl.bundle.pem.binit.keystore.certificate=file:/etc/letsencrypt/certs/fullchain.pem
spring.ssl.bundle.pem.binit.keystore.private-key=file:/etc/letsencrypt/certs/privkey.pem
server.ssl.bundle=binit