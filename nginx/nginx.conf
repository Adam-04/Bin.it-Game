server {
    listen 80;
    server_name binit.online www.binit.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name binit.online www.binit.online;

    ssl_certificate /etc/letsencrypt/live/binit.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/binit.online/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}